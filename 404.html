<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting — Namal Chamodya</title>
    <script type="text/javascript">
      // GitHub Pages SPA redirect for BrowserRouter
      // This script converts the path into a query string and redirects to index.html.
      // The index.html script then restores the correct URL in the browser history.
      var pathSegmentsToKeep = 0;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <p>Redirecting&hellip;</p>
  </body>
</html>
